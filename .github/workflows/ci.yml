name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger from the Actions tab
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install kuant + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Show environment
        run: |
          python --version
          python -c "import numpy; print(f'numpy {numpy.__version__}')"
          python -c "import scipy; print(f'scipy {scipy.__version__}')"
          python -c "import pytest; print(f'pytest {pytest.__version__}')"

      - name: Run pytest with coverage
        run: |
          pytest -v --tb=short --strict-markers \
            --cov=kuant --cov-report=xml --cov-report=term-missing

      # Upload coverage from the 3.12 job only (avoids duplicate uploads).
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: python -m pip install ruff

      - name: Ruff check
        run: ruff check kuant tests

  build:
    name: package build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build + twine
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Verify wheel installs cleanly
        run: |
          python -m venv /tmp/kuant-verify
          /tmp/kuant-verify/bin/pip install dist/*.whl
          /tmp/kuant-verify/bin/python -c "
          from kuant.core import bscall, gpdcdf, normppf
          from kuant.options import bscalldelta, impvol
          from kuant.stats import rollmean, hurstrs
          from kuant.qm.hmm import forward
          from kuant.sindy import permtest
          print('all subpackages import from installed wheel')
          "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14
