name: Publish to PyPI

# Trusted-publishing flow via OIDC.
#
# Triggers on any tag matching v*.*.* (e.g. v0.2.0). Builds sdist + wheel,
# then hands the artifacts to pypa/gh-action-pypi-publish, which authenticates
# to PyPI with a short-lived OIDC token. No long-lived API token stored in
# GitHub secrets.
#
# ONE-TIME PyPI setup:
#   https://pypi.org/manage/project/kuant/settings/publishing/
#   Add a new "trusted publisher":
#     Owner:           Scramblehub
#     Repository:      kuant
#     Workflow name:   publish.yml
#     Environment:     pypi
#
# Release flow:
#   1. Bump `version` in pyproject.toml and commit.
#   2. `git tag v0.2.0` and `git push origin v0.2.0`.
#   3. This workflow builds and uploads.
#   4. The GitHub Release is created automatically from the tag body.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Confirm pyproject version matches the tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "::error::tag ($TAG) does not match pyproject version ($PYPROJECT_VERSION)"
            exit 1
          fi
          echo "tag $TAG matches pyproject version $PYPROJECT_VERSION"

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Upload to PyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest

    # `pypi` is the environment name registered on PyPI's trusted-publisher
    # settings. This ties the OIDC token to that environment so releases
    # can be gated (e.g. by required reviewers) if we ever want to.
    environment:
      name: pypi
      url: https://pypi.org/project/kuant/

    permissions:
      # id-token: write is what enables the OIDC exchange. No PyPI API
      # token is stored in the repo.
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password` field: the action uses OIDC because id-token: write
        # is set above.

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
